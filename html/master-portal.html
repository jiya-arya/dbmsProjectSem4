    <style>
        :root {
            --bg: #f8fafc;
            --accent: #6366f1;
            --pastel-blue: #e0f2fe;
            --success: #22c55e;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --code-bg: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background: var(--bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-dark);
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            z-index: 10;
        }

        .sidebar h2 {
            font-size: 0.8rem;
            margin-bottom: 2rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
        }

        .topic-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding-right: 5px;
        }

        .topic-item {
            padding: 12px 18px;
            border-radius: 14px;
            margin-bottom: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .topic-item:hover {
            background: #f8fafc;
            color: var(--accent);
            padding-left: 25px;
        }

        .topic-item.active {
            background: var(--pastel-blue);
            color: var(--accent);
            border: 1px solid #d1e9ff;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 5%;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .back-btn {
            text-decoration: none;
            color: var(--accent);
            font-weight: 700;
            font-size: 0.85rem;
        }

        .header h1 {
            font-size: 1.6rem;
            color: #1e293b;
            text-transform: uppercase;
        }

        /* --- Query Card Styling --- */
        .query-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-badge {
            position: absolute;
            left: -15px;
            top: 30px;
            background: var(--accent);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .q-text {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.5;
            color: #1e293b;
        }

        .code-box {
            background: var(--code-bg);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1rem;
        }

        .sql-code {
            color: #cbd5e1;
            font-family: 'Consolas', monospace;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .sql-code b {
            color: #f472b6;
        }

        .output-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .output-img {
            max-width: 100%;
            max-height: 200px;
            display: block;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .output-img:hover {
            transform: scale(1.02);
        }

        /* Empty/Not Started State */
        .empty-state {
            text-align: center;
            padding: 5rem;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .status-badge {
            background: #fee2e2;
            color: #ef4444;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 1rem;
            border: 2px solid #fecaca;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: auto;
                height: auto;
            }

            .sidebar {
                width: 100%;
                height: auto;
                padding: 1rem;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
                position: sticky;
                top: 0;
                background: white;
            }

            .topic-list {
                display: flex;
                overflow-x: auto;
                gap: 8px;
                padding-bottom: 10px;
            }

            .topic-item {
                white-space: nowrap;
                margin-bottom: 0;
            }

            .main-content {
                padding: 1.5rem 1rem;
                overflow: visible;
            }
        }
    </style>
</head>

        const topics = Object.keys(assignmentData);
        const sidebar = document.getElementById('sidebarList');
        const container = document.getElementById('queryContainer');
        const titleDisplay = document.getElementById('activeTopicTitle');

        function renderTopic(topicName) {
            titleDisplay.innerText = topicName;
            container.innerHTML = "";

            const queries = assignmentData[topicName];

            // IF TOPIC IS EMPTY, SHOW "NOT STARTED"
            if (!queries || queries.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="status-badge">NOT STARTED</div>
                        <p>Questions for <b>${topicName}</b> have not been started yet.</p>
                        <p style="font-size:0.8rem; margin-top:10px;">Please check back later.</p>
                    </div>`;
                return;
            }

            queries.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'query-card';
                card.innerHTML = `
                <div class="q-badge">${index + 1}</div>
                <p class="q-text">${item.question}</p>
                <div class="code-box"><pre class="sql-code">${item.sql}</pre></div>
                <span class="output-label">Oracle Terminal Output:</span>
                <div style="background:#f1f5f9; border:1px solid #e2e8f0; border-radius:12px; padding:15px; overflow-x:auto; display: flex;">
                    <img src="${item.image}" alt="Output Screenshot" class="output-img" 
                    >
                </div>`;
                container.appendChild(card);
            });
        }

        topics.forEach((t) => {
            const li = document.createElement('li');
            li.className = 'topic-item';
            li.innerText = t;
            li.onclick = () => {
                document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('active'));
                li.classList.add('active');
                renderTopic(t);
            };
            sidebar.appendChild(li);
        });
    </script>
