<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBMS Project Submission - Jiya</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --accent: #6366f1;
            --pastel-blue: #e0f2fe;
            --success: #22c55e;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --code-bg: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background: var(--bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-dark);
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            z-index: 10;
        }

        .sidebar h2 {
            font-size: 0.8rem;
            margin-bottom: 2rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
        }

        .topic-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding-right: 5px;
        }

        .topic-item {
            padding: 12px 18px;
            border-radius: 14px;
            margin-bottom: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .topic-item:hover {
            background: #f8fafc;
            color: var(--accent);           
            padding-left: 25px;
        }        

        .topic-item.active {
            background: var(--pastel-blue);
            color: var(--accent);
            border: 1px solid #d1e9ff;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 5%;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .back-btn {
            text-decoration: none;
            color: var(--accent);
            font-weight: 700;
            font-size: 0.85rem;
        }

        .header h1 {
            font-size: 1.6rem;
            color: #1e293b;
            text-transform: uppercase;
        }

        /* --- Query Card Styling --- */
        .query-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-badge {
            position: absolute;
            left: -15px;
            top: 30px;
            background: var(--accent);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .q-text {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.5;
            color: #1e293b;
        }

        /* Code & Output Styling */
        .code-box {
            background: var(--code-bg);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1rem;
        }

        .sql-code {
            color: #cbd5e1;
            font-family: 'Consolas', monospace;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .sql-code b {
            color: #f472b6;
        }

        .output-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        /* Custom style for the image to keep it neat */
        .output-img {
            max-width: 100%;
            max-height: 200px;
            display: block;
            border-radius: 8px;
        }

        .output-img:hover {
    transform: scale(1.02); /* Slight zoom on hover for a premium feel */
}

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 5rem;
            color: var(--text-muted);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* --- Responsive Styles for Mobile --- */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow: auto;
                height: auto;
            }

            .sidebar {
                width: 100%;
                height: auto;
                padding: 1rem;
                border-right: none;
                border-bottom: 1px solid #e2e8f0;
                position: sticky;
                top: 0;
                background: white;
            }

            .sidebar h2 {
                margin-bottom: 1rem;
                font-size: 0.7rem;
            }

            .topic-list {
                display: flex;
                overflow-x: auto;
                gap: 8px;
                padding-bottom: 10px;
                -webkit-overflow-scrolling: touch;
            }

            .topic-item {
                white-space: nowrap;
                margin-bottom: 0;
                padding: 8px 15px;
            }
           
            .main-content {
                padding: 1.5rem 1rem;
                overflow: visible;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .query-card {
                padding: 1.5rem;
                margin-bottom: 1.5rem;
            }

            .q-badge {
                left: 15px;
                top: -15px;
            }
        }
    </style>
</head>

<body>

    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <h2>Assignment Topics</h2>
        <ul class="topic-list" id="sidebarList">
            <!-- Topics will be generated by JS -->
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="header">
            <div>
                <a href="dashboard.html" class="back-btn">&larr; DASHBOARD</a>
                <h1 id="activeTopicTitle">Select a Topic</h1>
            </div>
            <div style="text-align: right;">
                <p style="font-weight: 700; font-size: 0.8rem; color: var(--accent);">JIYA | 7011/24</p>
                <p style="font-size: 0.7rem; color: var(--text-muted);">BCA 4th SEMESTER</p>
            </div>
        </div>

        <!-- Container where the cards will appear -->
        <div id="queryContainer">
            <div class="empty-state">
                <p>Please select a Topic from the sidebar to view solved queries.</p>
            </div>
        </div>
    </main>

    <script>
        // --- MASTER DATA STORAGE ---
        // Added all your topics here
        const assignmentData = {
            "DDL Commands": [],
            "DML Commands": [],
            "DQL: Select": [],
            "Where & Order By": [],
            "Pattern Matching": [],
            "Grouping & Having": [],
            "Subqueries": [],
            "Scalar Functions": [],
            "SQL Joins": [],
            "Set Operators": [],
            "Database Views": [
                {
                    question: "Create a view to display employee name, salary, and department number from EMP table.",
                    sql: "<b>CREATE VIEW</b> emp_v1 <b>AS</b>\n<b>SELECT</b> ENAME, SAL, DEPTNO <b>FROM</b> EMP;",
                    image: "img.png" // Replace with your screenshot filename
                }
            ],
            "TCL and DCL": [],
            "PLSQL: Basics": [],
            "PLSQL: Conditionals": [],
            "PLSQL: Loops": [],
            "PLSQL: Types": [],
            "PLSQL: Cursors": [],
            "Procedures & Functions": [],
            "PLSQL: Packages": [],
            "Exception Handling": [],
            "Triggers": []
        };

        const topics = Object.keys(assignmentData);
        const sidebar = document.getElementById('sidebarList');
        const container = document.getElementById('queryContainer');
        const titleDisplay = document.getElementById('activeTopicTitle');

        // --- FUNCTION TO RENDER CARDS ---
        function renderTopic(topicName) {
            titleDisplay.innerText = topicName;
            container.innerHTML = ""; // Clear current view

            const queries = assignmentData[topicName];

            if (!queries || queries.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Questions for <b>${topicName}</b> are currently being updated.</p>
                    </div>`;
                return;
            }

            queries.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'query-card';
                card.innerHTML = `
                <div class="q-badge">${index + 1}</div>
                <p class="q-text">${item.question}</p>
                <div class="code-box"><pre class="sql-code">${item.sql}</pre></div>
                <span class="output-label">Oracle Terminal Output:</span>
                <div style="background:#f1f5f9; border:1px solid #e2e8f0; border-radius:12px; padding:15px; overflow-x:auto; display: flex;">
                    <img src="${item.image}" alt="Output Screenshot" class="output-img" onerror="this.src='https://via.placeholder.com/600x200?text=Screenshot+of+Result+Required'">
                </div>`;
                container.appendChild(card);
            });
        }

        // --- INITIALIZE SIDEBAR ---
        topics.forEach((t) => {
            const li = document.createElement('li');
            li.className = 'topic-item';
            li.innerText = t;
            li.onclick = () => {
                document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('active'));
                li.classList.add('active');
                renderTopic(t);
            };
            sidebar.appendChild(li);
        });

    </script>
</body>

</html>
