<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle SQL Lab - Jiya</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --accent: #6366f1;
            --pastel-blue: #e0f2fe;
            --success: #22c55e;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --code-bg: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background: var(--bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text-dark);
        }

        /* --- Sidebar Navigation --- */
        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            z-index: 10;
        }

        .sidebar h2 {
            font-size: 0.8rem;
            margin-bottom: 2rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 10px;
        }

        .topic-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding-right: 5px;
        }

        .topic-item {
            padding: 12px 18px;
            border-radius: 14px;
            margin-bottom: 5px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .topic-item:hover {
            background: #f8fafc;
            color: var(--accent);
        }

        .topic-item.active {
            background: var(--pastel-blue);
            color: var(--accent);
            border: 1px solid #d1e9ff;
        }

        /* --- Main Content Area --- */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 5%;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .back-btn {
            text-decoration: none;
            color: var(--accent);
            font-weight: 700;
            font-size: 0.85rem;
        }

        .header h1 {
            font-size: 1.6rem;
            color: #1e293b;
            text-transform: uppercase;
        }

        /* --- Table Structure Box (From Sir's Image) --- */
        .schema-box {
            background: #ffffff;
            border: 2px dashed #e2e8f0;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .schema-box h3 {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 1rem;
            letter-spacing: 1px;
        }

        .table-ref {
            font-family: 'Consolas', monospace;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #334155;
        }

        .table-ref b {
            color: var(--accent);
        }

        /* --- Query Card --- */
        .query-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
            position: relative;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-badge {
            position: absolute;
            left: -15px;
            top: 30px;
            background: var(--accent);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }

        .q-text {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #1e293b;
        }

        /* Code Box */
        .code-box {
            background: var(--code-bg);
            padding: 1.5rem;
            border-radius: 16px;
            margin-bottom: 1.5rem;
        }

        .sql-code {
            color: #cbd5e1;
            font-family: 'Consolas', monospace;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }

        .sql-code b {
            color: #f472b6;
        }

        /* Result Section */
        .output-label {
            font-size: 0.7rem;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 10px;
            display: block;
        }

        .output-img {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            min-height: 120px;
            background: #f8fafc;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 5rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- Sidebar with Sir's 5 Specific Topics -->
    <aside class="sidebar">
        <h2>ORACLE LAB TOPICS</h2>
        <ul class="topic-list" id="sidebarList">
            <!-- Topics will be loaded by JS -->
        </ul>
    </aside>

    <main class="main-content">
        <div class="header">
            <div>
                <a href="index.html" class="back-btn">&larr; BACK TO HUB</a>
                <h1 id="labTitle">Select Topic</h1>
            </div>
            <div style="text-align: right;">
                <p style="font-weight: 700; font-size: 0.8rem; color: var(--accent);">SPECIAL LAB WORK</p>
                <p style="font-size: 0.7rem; color: var(--text-muted);">EMP & DEPT IMPLEMENTATION</p>
            </div>
        </div>

        <!-- Constant Reference Section (As per Sir's Image) -->
        <div class="schema-box">
            <h3>Assumed Table Structure (Standard Oracle)</h3>
            <p class="table-ref"><b>SCOTTEMP:</b> EMPNO, ENAME, JOB, MGR, HIREDATE, SAL, COMM, DEPTNO</p>
            <p class="table-ref"><b>SCOTT.DEPT:</b> DEPTNO, DNAME, LOC</p>
        </div>

        <!-- Query Content Area -->
        <div id="queryContainer">
            <div class="empty-state">Please select a topic from the sidebar.</div>
        </div>
    </main>

    <script>
        // Data structure for the specific Lab topics
        const labData = {
            "SELECT QUERY": [],
            "WHERE CLAUSE": [],
            "LIKE OPERATOR": [],
            "GROUP FUNCTIONS": [],
            "SUBQUERIES": []
        };

        const sidebar = document.getElementById('sidebarList');
        const container = document.getElementById('queryContainer');
        const titleDisplay = document.getElementById('labTitle');

        function renderLabTopic(name) {
            titleDisplay.innerText = name;
            container.innerHTML = "";
            const queries = labData[name];

            if (!queries || queries.length === 0) {
                container.innerHTML = `<div class="empty-state">Queries for <b>${name}</b> are coming soon.</div>`;
                return;
            }

            queries.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'query-card';
                // ... inside your loop ...
                card.innerHTML = `
                <div class="q-badge">${index + 1}</div>
                <p class="q-text">${item.question}</p>
                <div class="code-box"><pre class="sql-code">${item.sql}</pre></div>
                <span class="output-label">Oracle Terminal Output:</span>
                <div style="background:#f1f5f9; border:1px solid #e2e8f0; border-radius:12px; padding:15px; overflow-x:auto;">
                    <pre style="margin:0; font-family:'Consolas', monospace; font-size:0.85rem; color:#475569; white-space:pre;">${item.output}</pre>
                </div>`;
                container.appendChild(card);
            });
        }

        // Initialize Sidebar
        Object.keys(labData).forEach(topic => {
            const li = document.createElement('li');
            li.className = 'topic-item';
            li.innerText = topic;
            li.onclick = () => {
                document.querySelectorAll('.topic-item').forEach(el => el.classList.remove('active'));
                li.classList.add('active');
                renderLabTopic(topic);
            };
            sidebar.appendChild(li);
        });
    </script>
</body>

</html>
